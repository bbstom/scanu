version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6
    container_name: crypto-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: change-this-password
      MONGO_INITDB_DATABASE: crypto-wallet-explorer
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - crypto-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://admin:change-this-password@mongodb:27017/crypto-wallet-explorer?authSource=admin
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - ADMIN_SETUP_KEY=change-this-to-a-secure-random-key
      - NEXT_PUBLIC_APP_URL=https://your-domain.com
      - NEXT_PUBLIC_BASE_URL=https://your-domain.com
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选，如果需要 SSL）
  # 取消注释以下内容以启用 Nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: crypto-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - crypto-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  crypto-network:
    driver: bridge
